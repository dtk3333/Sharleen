<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Fairy Memory Museum</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOCK SCREEN (DUNGEON ENTRANCE) -->

<div id="lockScreen">

<h1 class="dungeonTitle">The Secret Fairy Dungeon</h1>
<p>To enter the enchanted museum, speak the magic word</p>

<input type="password" id="passcode" placeholder="Enter password">
<button onclick="unlock()">Enter</button>

<p id="error"></p>

</div>


<!-- MUSEUM -->

<div id="museum" class="hidden">

<audio autoplay loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<h1 class="museumTitle">Lavender Fairy Memory Museum</h1>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

</div>

<div id="sparkles"></div>
<div id="butterflies"></div>

<script src="script.js"></script>

</body>
</html>
