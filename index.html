<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Secret Fairy Museum</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- DUNGEON BACKGROUND -->

<div id="dungeonBackground">

<div class="passwordBox">

<h2>Enter the Secret Dungeon</h2>
<p>Speak the magic word to unlock the museum</p>

<input type="password" id="passcode" placeholder="Password">
<button onclick="unlock()">Enter</button>

<p id="error"></p>

</div>

</div>


<!-- MUSEUM -->

<div id="museum" class="hidden">

<h1 class="museumTitle">Lavender Fairy Memory Museum</h1>

<audio id="music" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="museumRoom">

<div class="frame">
<img src="photo1.jpg">
</div>

<div class="frame">
<img src="photo2.jpg">
</div>

<div class="frame">
<img src="photo3.jpg">
</div>

</div>

<div class="visitors"></div>

</div>

<div id="sparkles"></div>
<div id="butterflies"></div>

<script src="script.js"></script>

</body>
</html>
